<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banheiro - Telemedicina Integrada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --free-color: #06D6A0;
    --free-dark: #049c73;
    --occupied-color: #EF476F;
    --occupied-dark: #c22e53;
    --yellow: #FFD166;
    --bg: #FFFBF3;
    --card: #FFFFFF;
    --ink: #26243B;
    --ink-soft: #6C6987;
    --rope: #B8B4CE;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(6, 214, 160, 0.08) 0%, transparent 45%),
      radial-gradient(circle at 88% 82%, rgba(239, 71, 111, 0.08) 0%, transparent 45%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .logo {
    width: 108px;
    height: auto;
    margin: 0 auto 14px;
    display: block;
    filter: drop-shadow(0 4px 10px rgba(38,36,59,0.10));
  }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 32px 0;
    line-height: 1.2;
  }

  /* Door knob + hanging tag */
  .door-scene {
    position: relative;
    height: 300px;
    margin-bottom: 28px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .doorknob {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(160deg, #E8E5F5, #C9C5E0);
    box-shadow: 0 3px 6px rgba(38,36,59,0.15), inset 0 -3px 4px rgba(0,0,0,0.08), inset 0 2px 3px rgba(255,255,255,0.6);
    z-index: 3;
  }

  .rope {
    position: absolute;
    top: 17px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 34px;
    background: var(--rope);
    border-radius: 2px;
    z-index: 2;
  }

  .tag {
    position: absolute;
    top: 48px;
    left: 50%;
    width: 220px;
    padding: 30px 20px 26px;
    border-radius: 20px;
    background: var(--occupied-color);
    box-shadow: 0 14px 28px -8px rgba(38,36,59,0.28);
    transform-origin: top center;
    transform: translateX(-50%) rotate(-2deg);
    transition: background 0.5s ease, transform 0.6s cubic-bezier(.34,1.56,.64,1);
    z-index: 1;
  }

  .tag.free {
    background: var(--free-color);
    transform: translateX(-50%) rotate(2deg);
  }

  .tag.swing {
    animation: swing 0.7s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes swing {
    0%   { transform: translateX(-50%) rotate(0deg) scale(0.96); }
    35%  { transform: translateX(-50%) rotate(8deg) scale(1.02); }
    60%  { transform: translateX(-50%) rotate(-5deg) scale(1); }
    80%  { transform: translateX(-50%) rotate(3deg) scale(1); }
    100% { transform: translateX(-50%) rotate(var(--rest, 2deg)) scale(1); }
  }

  .tag-hole {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    box-shadow: inset 0 2px 2px rgba(0,0,0,0.2);
  }

  .tag-icon {
    font-size: 44px;
    line-height: 1;
    margin-bottom: 10px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.12));
  }

  .tag-status {
    font-family: 'Baloo 2', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: white;
    letter-spacing: 0.02em;
    margin: 0;
  }

  .tag-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
    margin-top: 6px;
  }

  .action-btn {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 18px 24px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    background: var(--occupied-color);
    box-shadow: 0 8px 20px -6px rgba(239,71,111,0.5);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.3s ease;
  }

  .action-btn.free {
    background: var(--free-dark);
    box-shadow: 0 8px 20px -6px rgba(4,156,115,0.45);
  }

  .action-btn:active {
    transform: scale(0.97);
  }

  .action-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .footer-note {
    margin-top: 18px;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-weight: 600;
    min-height: 16px;
  }

  .pulse-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--free-color);
    margin-right: 6px;
    animation: pulse 1.6s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tag, .tag.swing, .pulse-dot { animation: none !important; transition: none !important; }
  }
</style>
</head>

  <h1>Tá liberado ou não?</h1>

  <div class="door-scene">
    <div class="doorknob"></div>
    <div class="rope"></div>
    <div class="tag" id="tag">
      <div class="tag-hole"></div>
      <div class="tag-icon" id="tagIcon">🚪</div>
      <p class="tag-status" id="tagStatus">Carregando...</p>
      <div class="tag-sub" id="tagSub">&nbsp;</div>
    </div>
  </div>

  <button class="action-btn" id="actionBtn" disabled>Carregando...</button>
  <div class="footer-note" id="footerNote"><span class="pulse-dot"></span>Atualiza sozinho pra todo mundo ver</div>
</div>

<script>
  const STORAGE_KEY = 'banheiro-status';
  const tag = document.getElementById('tag');
  const tagIcon = document.getElementById('tagIcon');
  const tagStatus = document.getElementById('tagStatus');
  const tagSub = document.getElementById('tagSub');
  const actionBtn = document.getElementById('actionBtn');
  const footerNote = document.getElementById('footerNote');

  let currentState = null; // { occupied: bool, since: number }
  let tickInterval = null;

  function timeAgo(ms) {
    const diff = Math.max(0, Date.now() - ms);
    const mins = Math.floor(diff / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    if (mins <= 0) return `há ${secs}s`;
    if (mins === 1) return `há 1 min`;
    return `há ${mins} min`;
  }

  function render() {
    if (!currentState) return;
    const { occupied, since } = currentState;

    tag.classList.toggle('free', !occupied);
    actionBtn.classList.toggle('free', !occupied);

    if (occupied) {
      tagIcon.textContent = '🔴';
      tagStatus.textContent = 'OCUPADO';
      tagSub.textContent = timeAgo(since);
      actionBtn.textContent = 'Liberar banheiro';
    } else {
      tagIcon.textContent = '🟢';
      tagStatus.textContent = 'LIVRE';
      tagSub.textContent = 'pode ir';
      actionBtn.textContent = 'Estou usando';
    }
    actionBtn.disabled = false;
  }

  function startTicker() {
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(() => {
      if (currentState && currentState.occupied) render();
    }, 1000);
  }

  async function loadState() {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      currentState = result ? JSON.parse(result.value) : { occupied: false, since: Date.now() };
    } catch (e) {
      currentState = { occupied: false, since: Date.now() };
    }
    render();
  }

  async function toggleState() {
    actionBtn.disabled = true;
    const willBeOccupied = !(currentState && currentState.occupied);
    const newState = { occupied: willBeOccupied, since: Date.now() };
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(newState), true);
      if (!result) throw new Error('Falha ao salvar');
      currentState = newState;
      tag.classList.remove('swing');
      void tag.offsetWidth; // reflow to restart animation
      tag.style.setProperty('--rest', willBeOccupied ? '-2deg' : '2deg');
      tag.classList.add('swing');
      render();
      footerNote.innerHTML = '<span class="pulse-dot"></span>Atualizado!';
      setTimeout(() => {
        footerNote.innerHTML = '<span class="pulse-dot"></span>Atualiza sozinho pra todo mundo ver';
      }, 2000);
    } catch (e) {
      footerNote.textContent = 'Ops, não deu pra salvar. Tenta de novo.';
      actionBtn.disabled = false;
    }
  }

  async function poll() {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      const remoteState = result ? JSON.parse(result.value) : { occupied: false, since: Date.now() };
      if (!currentState || remoteState.occupied !== currentState.occupied || remoteState.since !== currentState.since) {
        currentState = remoteState;
        render();
      }
    } catch (e) {
      // silent fail, keep last known state
    }
  }

  actionBtn.addEventListener('click', toggleState);

  loadState().then(startTicker);
  setInterval(poll, 3000);
</script>
